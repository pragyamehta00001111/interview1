<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Linux Server Admin Guide</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #38bdf8;
            --accent: #10b981;
            --warning: #f59e0b;
            --border: #334155;
            --font-family: 'Segoe UI', system-ui, sans-serif;
        }
        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            -webkit-text-size-adjust: 100%; /* Prevents text scaling on orientation change */
        }
        header {
            background-color: var(--surface-color);
            padding: 40px 20px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }
        h1 { color: var(--primary); margin: 0; font-size: 2.5rem; line-height: 1.2; }
        p.subtitle { color: var(--text-muted); font-size: 1.1rem; margin-top: 10px; }
        
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }
        
        /* Tabs */
        .tabs {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 40px;
        }
        .tab-btn {
            background-color: var(--surface-color);
            color: var(--text-main);
            border: 2px solid var(--border);
            padding: 12px 24px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            flex: 1 1 auto; /* Allows buttons to grow and fill space evenly on mobile */
            text-align: center;
        }
        .tab-btn.active, .tab-btn:hover {
            background-color: var(--primary);
            color: #000;
            border-color: var(--primary);
        }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Commands Grid */
        .cmd-grid {
            display: grid;
            /* Changed to auto-fit and reduced min-width for better mobile scaling */
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }
        .cmd-card {
            background-color: var(--surface-color);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            border-left: 5px solid var(--accent);
            word-wrap: break-word;
        }
        .cmd-title {
            font-family: monospace;
            font-size: 1.5rem;
            color: var(--accent);
            margin-bottom: 10px;
            font-weight: bold;
            word-break: break-all; /* Prevents long commands from breaking the container */
        }
        .cmd-desc { font-weight: bold; margin-bottom: 10px; }
        .cmd-detail { color: var(--text-muted); font-size: 0.95rem; }

        /* Q&A Section */
        .qa-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
        }
        .qa-filter-btn {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.95rem;
        }
        .qa-filter-btn.active, .qa-filter-btn:hover {
            background: var(--primary);
            color: #000;
        }
        .qa-card {
            background-color: var(--surface-color);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .qa-cat {
            display: inline-block;
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 3px 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .qa-q { font-size: 1.15rem; font-weight: bold; margin-bottom: 15px; line-height: 1.4; }
        .qa-toggle {
            background-color: #293548;
            color: var(--text-main);
            border: none;
            padding: 10px 18px; /* Slightly larger for easier tapping */
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 0.95rem;
        }
        .qa-toggle:hover { background-color: #334155; }
        .qa-a {
            display: none;
            padding-top: 15px;
            border-top: 1px dashed var(--border);
            color: var(--text-muted);
        }
        .qa-a.show { display: block; }

        /* Scenarios Section */
        .scenario-card {
            background-color: var(--surface-color);
            border: 1px solid var(--border);
            border-top: 5px solid var(--warning);
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 30px;
            overflow-wrap: break-word;
        }
        .scenario-title {
            font-size: 1.3rem;
            color: var(--warning);
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            line-height: 1.4;
        }
        .scenario-section {
            margin-bottom: 20px;
        }
        .scenario-label {
            font-weight: bold;
            color: var(--primary);
            font-size: 1.1rem;
            margin-bottom: 5px;
        }
        .terminal-block {
            background-color: #000;
            color: #10b981;
            font-family: 'Courier New', Courier, monospace;
            padding: 15px;
            border-radius: 6px;
            margin-top: 10px;
            border: 1px solid #1f2937;
            overflow-x: auto; /* Allows horizontal scrolling for long code lines on mobile */
            white-space: pre-wrap; /* Keeps formatting but wraps text */
            word-break: break-word;
        }
        .takeaway-block {
            background-color: rgba(16, 185, 129, 0.1);
            border-left: 4px solid var(--accent);
            padding: 15px;
            border-radius: 0 6px 6px 0;
            margin-top: 20px;
            font-style: italic;
        }

        code {
            background-color: #0f172a;
            color: #f472b6;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            word-break: break-word;
        }

        /* Mobile Media Queries */
        @media (max-width: 768px) {
            header {
                padding: 30px 15px;
            }
            h1 {
                font-size: 1.8rem;
            }
            p.subtitle {
                font-size: 1rem;
            }
            .container {
                margin: 20px auto;
                padding: 0 15px;
            }
            .tabs {
                flex-direction: column; /* Stack tabs vertically on small screens */
                gap: 10px;
                margin-bottom: 25px;
            }
            .tab-btn {
                width: 100%;
                padding: 14px;
            }
            .cmd-grid {
                grid-template-columns: 1fr; /* Single column for commands */
            }
            .qa-card, .scenario-card, .cmd-card {
                padding: 18px; /* Slightly less padding to save screen real estate */
            }
            .scenario-title {
                font-size: 1.2rem;
            }
            ul {
                padding-left: 20px; /* Reduce indent on mobile lists */
            }
        }
    </style>
</head>
<body>

<header>
    <h1>The Ultimate Linux Administrator Guide</h1>
    <p class="subtitle">Complete Encyclopedia of Commands, Q&A, and Practical Scenarios</p>
</header>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('commands')">Command Encyclopedia (50)</button>
        <button class="tab-btn" onclick="switchTab('qa')">Interview Q&A (90)</button>
        <button class="tab-btn" onclick="switchTab('scenarios')">Practical Scenarios (7)</button>
    </div>

    <div id="commands" class="tab-content active">
        <div class="cmd-grid" id="cmd-container"></div>
    </div>

    <div id="qa" class="tab-content">
        <div class="qa-filters" id="qa-filters-container">
            <button class="qa-filter-btn active" onclick="filterQA('All')">All Categories</button>
        </div>
        <div id="qa-container"></div>
    </div>

    <div id="scenarios" class="tab-content">
        <div id="scenarios-container"></div>
    </div>
</div>

<script>
    // --- DATA MODULES ---

    const commandsData = [
        {"cmd": "ls", "desc": "List directory contents.", "detail": "Use '-l' for long format, '-a' for hidden files, and '-h' for human-readable sizes."},
        {"cmd": "cd", "desc": "Change directory.", "detail": "Navigates the filesystem. 'cd ~' goes to home, 'cd -' goes to previous directory."},
        {"cmd": "pwd", "desc": "Print working directory.", "detail": "Outputs the absolute path of the current directory."},
        {"cmd": "mkdir", "desc": "Make directory.", "detail": "Creates new folders. Use '-p' to create parent directories if they don't exist."},
        {"cmd": "rm", "desc": "Remove files or directories.", "detail": "Deletes files. Use '-r' for recursive (directories) and '-f' to force."},
        {"cmd": "cp", "desc": "Copy files and directories.", "detail": "Duplicates files. Use '-r' to copy directories, and '-p' to preserve permissions."},
        {"cmd": "mv", "desc": "Move or rename files.", "detail": "Moves files from one location to another, or renames them."},
        {"cmd": "touch", "desc": "Create empty files or update timestamps.", "detail": "Used to quickly create a blank file or update access/modification time."},
        {"cmd": "file", "desc": "Determine file type.", "detail": "Analyzes the headers/magic numbers of a file to tell you what it is."},
        {"cmd": "stat", "desc": "Display file or file system status.", "detail": "Shows detailed metadata including Size, Blocks, Inode, and exact timestamps."},
        {"cmd": "cat", "desc": "Concatenate files and print on standard output.", "detail": "Quickly view the contents of a small file. Use '-n' to number lines."},
        {"cmd": "less", "desc": "View file contents interactively.", "detail": "A pager that allows forward and backward navigation through large text files."},
        {"cmd": "tail", "desc": "Output the last part of files.", "detail": "Defaults to the last 10 lines. The '-f' (follow) flag is essential for watching logs."},
        {"cmd": "head", "desc": "Output the first part of files.", "detail": "Defaults to the first 10 lines. Useful for quickly checking the header of a file."},
        {"cmd": "grep", "desc": "Print lines matching a pattern.", "detail": "Searches text. Use '-i' for case-insensitive, '-R' for recursive, and '-v' to invert match."},
        {"cmd": "awk", "desc": "Pattern scanning and processing language.", "detail": "Powerful for columnar data. E.g., 'awk \"{print $1}\" file.txt' prints the first column."},
        {"cmd": "sed", "desc": "Stream editor for filtering and transforming text.", "detail": "Used mostly for find and replace. E.g., 'sed -i \"s/old/new/g\" file.txt'."},
        {"cmd": "find", "desc": "Search for files in a directory hierarchy.", "detail": "Highly robust. E.g., 'find /var/log -type f -mtime +30' finds files older than 30 days."},
        {"cmd": "tar", "desc": "Tape Archive utility.", "detail": "Groups files into an archive. 'tar -czvf archive.tar.gz /folder' creates a compressed archive."},
        {"cmd": "gzip / gunzip", "desc": "Compress or expand files.", "detail": "Standard Linux compression. Replaces the original file with a .gz version."},
        {"cmd": "zip / unzip", "desc": "Package and compress files.", "detail": "Cross-platform compression utility."},
        {"cmd": "rsync", "desc": "Remote file and directory synchronization.", "detail": "Efficiently transfers only the differences between source and destination files."},
        {"cmd": "chmod", "desc": "Change file mode bits (permissions).", "detail": "Uses octal (e.g., 755 for rwxr-xr-x) or symbolic (u+x) syntax."},
        {"cmd": "chown", "desc": "Change file owner and group.", "detail": "Transfers ownership. E.g., 'chown user:group file.txt'."},
        {"cmd": "chgrp", "desc": "Change group ownership.", "detail": "Similar to chown but explicitly targets the group assignment."},
        {"cmd": "usermod", "desc": "Modify a user account.", "detail": "Used to add users to groups ('usermod -aG sudo user'), or lock accounts."},
        {"cmd": "passwd", "desc": "Change user password.", "detail": "Updates authentication tokens."},
        {"cmd": "top", "desc": "Display Linux processes.", "detail": "Real-time, dynamic view of the running system. Shows CPU/Memory usage."},
        {"cmd": "htop", "desc": "Interactive process viewer.", "detail": "An enhanced, colored version of top with easier process termination."},
        {"cmd": "ps", "desc": "Report a snapshot of current processes.", "detail": "Unlike top, ps is a static snapshot. 'ps aux' shows all processes."},
        {"cmd": "kill", "desc": "Send a signal to a process.", "detail": "Terminates processes by PID. 'kill -15' (SIGTERM) or 'kill -9' (SIGKILL)."},
        {"cmd": "killall", "desc": "Kill processes by name.", "detail": "Terminates all instances of a named program (e.g., 'killall nginx')."},
        {"cmd": "systemctl", "desc": "Control the systemd system and service manager.", "detail": "Start, stop, restart, enable (on boot), and check status of services."},
        {"cmd": "journalctl", "desc": "Query the systemd journal.", "detail": "Views centralized system and service logs."},
        {"cmd": "df", "desc": "Report file system disk space usage.", "detail": "Use '-h' for human-readable output. Use '-i' to check inode exhaustion."},
        {"cmd": "du", "desc": "Estimate file space usage.", "detail": "Calculates the size of directories. 'du -sh /var' gives a summary."},
        {"cmd": "mount", "desc": "Mount a filesystem.", "detail": "Attaches a storage device or remote filesystem to the local directory tree."},
        {"cmd": "umount", "desc": "Unmount file systems.", "detail": "Safely detaches a mounted device."},
        {"cmd": "free", "desc": "Display amount of free and used memory.", "detail": "Use '-m' or '-g' to show RAM and Swap usage."},
        {"cmd": "ping", "desc": "Send ICMP ECHO_REQUEST to network hosts.", "detail": "Tests basic Layer 3 connectivity."},
        {"cmd": "netstat", "desc": "Print network connections, routing tables, stats.", "detail": "Legacy network tool."},
        {"cmd": "ss", "desc": "Investigate sockets.", "detail": "The modern, faster replacement for netstat. 'ss -tulnp' shows listening ports."},
        {"cmd": "ip", "desc": "Show / manipulate routing, network devices, interfaces.", "detail": "Replaces ifconfig. 'ip a' shows IP addresses."},
        {"cmd": "curl", "desc": "Transfer a URL.", "detail": "Command-line HTTP client. Great for testing REST APIs."},
        {"cmd": "wget", "desc": "Non-interactive network downloader.", "detail": "Designed specifically for downloading files robustly."},
        {"cmd": "iptables", "desc": "Administration tool for IPv4 packet filtering and NAT.", "detail": "The underlying kernel-level firewall framework."},
        {"cmd": "ufw", "desc": "Uncomplicated Firewall.", "detail": "A user-friendly front-end for managing iptables."},
        {"cmd": "ssh", "desc": "OpenSSH SSH client (remote login program).", "detail": "Securely logs into a remote machine."},
        {"cmd": "dmesg", "desc": "Print or control the kernel ring buffer.", "detail": "Essential for diagnosing hardware issues during or after boot."},
        {"cmd": "lsof", "desc": "List open files.", "detail": "Shows what files a process has open. Also maps network sockets."}
    ];

    const qaData = [
        {"cat": "Boot & Init", "q": "Describe the 4 main stages of the Linux boot process.", "a": "1. BIOS/UEFI (Hardware POST & finds bootloader). 2. Bootloader/GRUB (Loads the Kernel into RAM). 3. Kernel (Initializes hardware, mounts root filesystem). 4. Init/systemd (Starts all background services and user spaces)."},
        {"cat": "Boot & Init", "q": "What is the purpose of the GRUB bootloader?", "a": "GRUB (Grand Unified Bootloader) allows the user to choose which operating system or kernel version to load, and passes essential boot parameters to the chosen kernel."},
        {"cat": "Boot & Init", "q": "What is the difference between systemd and SysVinit?", "a": "SysVinit started services sequentially using bash scripts, which was slow. systemd is a modern replacement that parallelizes service startup, handles dependency management, and standardizes logging (journald)."},
        {"cat": "Boot & Init", "q": "How do you reset a lost root password?", "a": "Interrupt the GRUB boot menu, append 'rd.break' or 'init=/bin/bash' to the kernel line. Once booted, remount / as read-write, run the 'passwd' command, and force an SELinux relabel (touch /.autorelabel)."},
        {"cat": "Boot & Init", "q": "What is the /etc/fstab file used for?", "a": "The File System Table controls how block devices and remote filesystems are automatically mounted into the directory tree during boot."},
        {"cat": "Boot & Init", "q": "What happens if there is a typo in /etc/fstab?", "a": "The system will fail to boot completely and drop into 'emergency mode'. You must log in locally, remount the drive as read-write, and fix the typo in vi."},
        {"cat": "Boot & Init", "q": "What is a systemd 'target'?", "a": "A target groups units together. It replaces old runlevels. For example, 'multi-user.target' boots the server to a command line, while 'graphical.target' boots into a GUI."},
        {"cat": "Boot & Init", "q": "How do you change the default boot target?", "a": "Use the command: <code>systemctl set-default multi-user.target</code>."},
        {"cat": "Boot & Init", "q": "What is the initramfs?", "a": "The Initial RAM File System is a temporary root filesystem loaded into memory during boot. It contains necessary kernel modules (like RAID or LVM drivers) required to access the real physical root disk."},
        {"cat": "Boot & Init", "q": "How do you view kernel boot messages after the system is running?", "a": "Execute <code>dmesg</code> or <code>journalctl -k</code> to view the kernel ring buffer, which records hardware initialization and driver logs."},
        
        {"cat": "Storage & Filesystems", "q": "What is LVM and what are its main advantages?", "a": "Logical Volume Management abstracts physical drives into Volume Groups. Its main advantage is flexibility: it allows you to dynamically resize, extend, or snapshot partitions without server downtime."},
        {"cat": "Storage & Filesystems", "q": "Explain the relationship between PV, VG, and LV in LVM.", "a": "Physical Volumes (PV) are actual disks. They are grouped together into a large storage pool called a Volume Group (VG). You carve out Logical Volumes (LV) from the VG, which act as standard mountable partitions."},
        {"cat": "Storage & Filesystems", "q": "What is an Inode?", "a": "An Inode (Index Node) is a data structure on the filesystem that stores metadata about a file (permissions, owner, timestamps, and physical data block pointers). It does *not* store the file's name or its actual contents."},
        {"cat": "Storage & Filesystems", "q": "If 'df -h' shows 50GB free, why would you get a 'No space left on device' error?", "a": "You have likely run out of Inodes. If a program generates millions of zero-byte files, the filesystem exhausts its index capacity before it runs out of physical byte space. Verify this with 'df -i'."},
        {"cat": "Storage & Filesystems", "q": "What is the difference between ext4 and XFS?", "a": "Both are journaling filesystems. ext4 is the standard for Debian/Ubuntu, highly stable for general use. XFS is the default in RHEL, highly optimized for massive files, parallel I/O, and enterprise storage arrays, but it cannot be easily shrunk."},
        {"cat": "Storage & Filesystems", "q": "What is RAID 1 and what is its primary purpose?", "a": "RAID 1 is Data Mirroring. Data is written identically to two separate drives. Its primary purpose is hardware redundancy: if one drive physically fails, the server continues running with no data loss."},
        {"cat": "Storage & Filesystems", "q": "What is RAID 5 and how many drives does it require?", "a": "RAID 5 uses Block-Level Striping with Distributed Parity. It requires a minimum of 3 drives. It offers a balance of read speed, storage capacity, and fault tolerance (can survive 1 drive failure)."},
        {"cat": "Storage & Filesystems", "q": "How do you safely add 2GB of swap space to a live server?", "a": "1. <code>dd if=/dev/zero of=/swapfile bs=1M count=2048</code>. 2. <code>chmod 600 /swapfile</code>. 3. <code>mkswap /swapfile</code>. 4. <code>swapon /swapfile</code>. 5. Add it to /etc/fstab for persistence."},
        {"cat": "Storage & Filesystems", "q": "How do you identify which process is causing high Disk I/O?", "a": "Use <code>iostat</code> to confirm which block device is under load, then use <code>iotop</code> to pinpoint the exact Linux process (PID) consuming the read/write bandwidth."},
        {"cat": "Storage & Filesystems", "q": "What does the 'fsck' command do?", "a": "File System Consistency Check. It scans and repairs corrupted filesystems. *Warning:* Never run fsck on a mounted filesystem, as it will cause severe data corruption."},
        
        {"cat": "Networking", "q": "Explain the difference between TCP and UDP.", "a": "TCP is connection-oriented and reliable; it guarantees packet delivery and ordering (e.g., HTTP, SSH). UDP is connectionless and fast, prioritizing speed over reliability (e.g., DNS, Video Streaming)."},
        {"cat": "Networking", "q": "How do you verify if a service is actively listening on port 443?", "a": "Run <code>ss -tulnp | grep 443</code> or <code>netstat -tulnp | grep 443</code>. This will display the listening socket and the specific PID handling the traffic."},
        {"cat": "Networking", "q": "What is the difference between 'ping' and 'traceroute'?", "a": "Ping confirms basic reachability and latency to a destination. Traceroute maps the exact hop-by-hop path packets take across routers to reach the destination, identifying where a connection drops."},
        {"cat": "Networking", "q": "A server can ping 8.8.8.8 but cannot ping google.com. What is the issue?", "a": "It is a DNS (Domain Name System) resolution failure. The server has external internet connectivity but cannot translate human-readable domains into IP addresses. Check /etc/resolv.conf."},
        {"cat": "Networking", "q": "How do you view the routing table and default gateway?", "a": "Execute <code>ip route</code>. The line starting with 'default via' indicates the gateway IP where traffic meant for external networks is sent."},
        {"cat": "Networking", "q": "What is network interface bonding (or teaming)?", "a": "It is the process of combining two or more physical network cards (NICs) into a single logical interface. This provides high availability (failover) and increased bandwidth (load balancing)."},
        {"cat": "Networking", "q": "How do you configure a static IP in modern Linux systems?", "a": "Modify the YAML file in <code>/etc/netplan/</code> (Ubuntu/Debian) and apply with <code>netplan apply</code>, or use <code>nmcli</code> (NetworkManager) in RHEL/CentOS systems."},
        {"cat": "Networking", "q": "What does iptables do?", "a": "It is a user-space utility that configures the Linux kernel firewall. It inspects network traffic packets and decides to ACCEPT, DROP, or REJECT them based on defined rulesets."},
        {"cat": "Networking", "q": "What is a MAC address vs an IP address?", "a": "A MAC address is a permanent, physical hardware address assigned to a network card, used for local network (Layer 2) routing. An IP address is a logical address assigned by software, used for routing across the internet (Layer 3)."},
        {"cat": "Networking", "q": "How do you test if a remote server's port (like 3306 for MySQL) is accessible through firewalls?", "a": "Use telnet or netcat. E.g., <code>nc -zv 192.168.1.50 3306</code>. If it says 'Connection refused', the firewall blocked it or the service is down."},
        
        {"cat": "Security", "q": "What are the numerical equivalents of Read, Write, and Execute permissions?", "a": "Read = 4. Write = 2. Execute = 1. Therefore, full permissions (rwx) equal 7. Read and execute (r-x) equal 5."},
        {"cat": "Security", "q": "Explain the permission 'chmod 755'.", "a": "The Owner has full access (7). The Group has read and execute access (5). Others/World have read and execute access (5). Standard for executable scripts or web directories."},
        {"cat": "Security", "q": "What is the principle of least privilege?", "a": "A core security concept stating that a user, program, or process should have only the bare minimum permissions necessary to perform its specific function, and nothing more."},
        {"cat": "Security", "q": "How do you securely disable root SSH login?", "a": "Edit <code>/etc/ssh/sshd_config</code>, find the line <code>PermitRootLogin</code>, change it to <code>no</code>, save the file, and restart the SSH service. Administrators must log in as a standard user and escalate privileges using sudo."},
        {"cat": "Security", "q": "What is a SetUID (SUID) bit?", "a": "When applied to an executable file, the SUID bit allows a standard user to execute the program with the privileges of the file's owner (usually root). Example: the 'passwd' command. It is a massive security risk if configured improperly."},
        {"cat": "Security", "q": "What is SELinux and what does 'Enforcing' mean?", "a": "Security-Enhanced Linux is a mandatory access control system. In 'Enforcing' mode, it actively blocks actions that violate its strict security policies, even if standard file permissions (rwx) would normally allow the action."},
        {"cat": "Security", "q": "How does Fail2ban work?", "a": "It monitors log files (like auth.log) for repetitive failed login attempts. Upon hitting a failure threshold, it automatically creates a temporary iptables firewall rule to block the offending IP address."},
        {"cat": "Security", "q": "Why must you use 'visudo' instead of 'vim' to edit the sudoers file?", "a": "<code>visudo</code> checks the file for syntax errors before saving. If you make a typo with vim, you can permanently break the sudo command, locking all administrators out of root access."},
        {"cat": "Security", "q": "How do you configure SSH key-based authentication?", "a": "Generate a keypair on the client machine using <code>ssh-keygen</code>. Then securely copy the public key to the server using <code>ssh-copy-id user@server</code>. The server stores this in ~/.ssh/authorized_keys."},
        {"cat": "Security", "q": "What is an ACL (Access Control List)?", "a": "ACLs allow you to assign granular permissions to specific users or groups that override the standard Owner/Group/Other permission structure. Managed using the 'getfacl' and 'setfacl' commands."},
        
        {"cat": "Users & Groups", "q": "What is the difference between /etc/passwd and /etc/shadow?", "a": "/etc/passwd stores basic user account info (username, UID, home directory, default shell) and is readable by everyone. /etc/shadow stores the encrypted password hashes and expiration dates, and is strictly readable only by root."},
        {"cat": "Users & Groups", "q": "How do you add an existing user to the 'sudo' or 'wheel' group?", "a": "Use the command: <code>usermod -aG wheel username</code>. (The -a flag is critical to *append* the group; omitting it removes the user from all their other groups)."},
        {"cat": "Users & Groups", "q": "What does a UID of 0 mean?", "a": "A User ID of 0 is hardcoded in Linux to be the root superuser account. Any account assigned UID 0 has absolute, unrestricted access to the entire system."},
        {"cat": "Users & Groups", "q": "How do you completely remove a user and their home directory?", "a": "Use the command: <code>userdel -r username</code>. The '-r' flag forces the deletion of their home directory and mail spool."},
        {"cat": "Users & Groups", "q": "How do you force a user to change their password on their next login?", "a": "Run the command: <code>chage -d 0 username</code>. This sets the date of the last password change to the epoch, instantly expiring it."},
        {"cat": "Users & Groups", "q": "What is the sticky bit?", "a": "A permission bit typically applied to shared directories like /tmp. It ensures that only the file's owner (or root) can delete or rename a file within that directory, even if other users have write access to the directory itself."},
        {"cat": "Users & Groups", "q": "How do you lock a user account temporarily?", "a": "Execute <code>usermod -L username</code> or <code>passwd -l username</code>. This places an exclamation mark in the /etc/shadow hash, making login impossible."},
        {"cat": "Users & Groups", "q": "What is the /etc/skel directory?", "a": "The 'skeleton' directory contains default bash profiles (.bashrc, .profile). When a new user is created, the contents of /etc/skel are automatically copied into their new home directory."},
        {"cat": "Users & Groups", "q": "What is PAM?", "a": "Pluggable Authentication Modules. It is the centralized architectural framework in Linux that handles all user authentication, allowing sysadmins to enforce complex password requirements or multi-factor authentication seamlessly."},
        {"cat": "Users & Groups", "q": "How do you change the default login shell for a user?", "a": "Use the command: <code>chsh -s /bin/zsh username</code> to change their default shell to Zsh (or any other installed shell)."},
        
        {"cat": "Process Management", "q": "What is the difference between a Zombie and an Orphan process?", "a": "An Orphan's parent has died, so it is adopted by systemd (PID 1) and continues running. A Zombie has finished executing, but its parent hasn't read its exit status, leaving a dead entry in the process table."},
        {"cat": "Process Management", "q": "How do you kill a Zombie process?", "a": "You cannot kill a zombie directly because it is already dead. You must send a SIGCHLD signal to its parent process, or kill/restart the parent process entirely."},
        {"cat": "Process Management", "q": "What is the difference between SIGTERM and SIGKILL?", "a": "SIGTERM (15) politely asks a process to stop, allowing it to clean up temporary files and close databases safely. SIGKILL (9) is handled by the kernel, immediately and forcefully terminating the process without any cleanup."},
        {"cat": "Process Management", "q": "What does the 'nice' command do?", "a": "It assigns a priority to a process. Values range from -20 (highest priority, most CPU time) to 19 (lowest priority, yields to other processes). Only root can assign negative nice values."},
        {"cat": "Process Management", "q": "How do you send a running foreground process to the background?", "a": "Press <code>Ctrl + Z</code> to suspend the process, then type <code>bg</code> to resume it in the background. Use the <code>jobs</code> command to see backgrounded tasks."},
        {"cat": "Process Management", "q": "What is the purpose of the 'nohup' command?", "a": "No Hangup. It runs a command immune to hangups. If you start a long-running script over SSH and your connection drops, nohup ensures the script continues running on the server."},
        {"cat": "Process Management", "q": "What does load average '5.0, 3.0, 1.0' signify on a 4-core machine?", "a": "Load average shows CPU/queue demand over 1, 5, and 15 mins. On a 4-core system, a 1-minute load of 5.0 means all 4 cores are at 100%, and 1 process is stuck waiting in the queue. The trend shows traffic is sharply increasing right now."},
        {"cat": "Process Management", "q": "What is the Out-Of-Memory (OOM) Killer?", "a": "A kernel feature that activates when the server completely runs out of physical RAM and Swap. It calculates a 'badness' score and forcefully kills large processes to prevent the entire operating system from crashing."},
        {"cat": "Process Management", "q": "How do you track the system calls made by a hanging application?", "a": "Use <code>strace -p <PID></code>. It attaches to the running process and outputs every file it attempts to open, every network call it makes, and every permission error it encounters in real-time."},
        {"cat": "Process Management", "q": "How do you view processes sorted by memory usage?", "a": "Open <code>top</code> and press <code>Shift + M</code>, or use <code>ps aux --sort=-%mem | head</code>."},
        
        {"cat": "Package Management", "q": "What is the difference between 'apt update' and 'apt upgrade'?", "a": "'update' simply downloads the latest package lists from the remote repositories so the system knows what is available. 'upgrade' actually downloads and installs the newer versions of the software."},
        {"cat": "Package Management", "q": "How do you install a package from a local file on RHEL and Ubuntu?", "a": "On RHEL/CentOS: <code>rpm -ivh file.rpm</code> or <code>yum localinstall file.rpm</code>. On Ubuntu/Debian: <code>dpkg -i file.deb</code> or <code>apt install ./file.deb</code>."},
        {"cat": "Package Management", "q": "How do you safely apply a critical kernel patch without downtime?", "a": "In enterprise environments, use Live Patching tools (like Canonical Livepatch or Red Hat kpatch) which inject security fixes directly into the running kernel's memory without requiring a server reboot."},
        {"cat": "Package Management", "q": "A yum update broke an application. How do you roll it back?", "a": "Use <code>yum history</code> to identify the transaction ID of the problematic update. Then run <code>yum history undo <ID></code> to safely revert the affected packages back to their previous state."},
        {"cat": "Package Management", "q": "Where do you configure third-party software repositories?", "a": "Debian/Ubuntu: /etc/apt/sources.list and /etc/apt/sources.list.d/. RHEL/CentOS: /etc/yum.repos.d/."},
        {"cat": "Package Management", "q": "How do you prevent a specific legacy application from being automatically updated?", "a": "Debian: <code>apt-mark hold package_name</code>. Red Hat: Open /etc/yum.conf and append <code>exclude=package_name</code>."},
        {"cat": "Package Management", "q": "What does a GPG signature error mean when running an update?", "a": "It means the package manager cannot verify the cryptographic signature of the downloaded software. The repository's public key has expired or changed, and you must import the new key to prevent installing tampered software."},
        {"cat": "Package Management", "q": "How do you find out which package installed a specific file (e.g., /etc/ssh/sshd_config)?", "a": "On Red Hat: <code>rpm -qf /etc/ssh/sshd_config</code>. On Ubuntu: <code>dpkg -S /etc/ssh/sshd_config</code>."},
        {"cat": "Package Management", "q": "How do you clear the package manager cache to free up disk space?", "a": "Run <code>apt clean</code> (Debian) or <code>yum clean all</code> (Red Hat). This deletes the cached, downloaded .deb/.rpm installation files."},
        {"cat": "Package Management", "q": "What are the standard steps to compile a program from source code?", "a": "1. Extract the tarball. 2. Run <code>./configure</code> (checks dependencies). 3. Run <code>make</code> (compiles the code). 4. Run <code>sudo make install</code> (moves the compiled binaries to system directories)."},
        
        {"cat": "Troubleshooting & Logs", "q": "Where are the vast majority of system logs stored?", "a": "In the <code>/var/log/</code> directory. Critical general logs are in <code>/var/log/syslog</code> (Debian) or <code>/var/log/messages</code> (RHEL)."},
        {"cat": "Troubleshooting & Logs", "q": "A service fails to start. What is the absolute first command you run?", "a": "Run <code>journalctl -u servicename.service -n 50 --no-pager</code>. This immediately displays the systemd logs specific to that service to reveal why it crashed."},
        {"cat": "Troubleshooting & Logs", "q": "What is logrotate and why is it essential?", "a": "Logrotate automatically compresses, archives, and deletes old log files on a schedule. Without it, log files would grow infinitely until they consume 100% of the server's disk space, causing a crash."},
        {"cat": "Troubleshooting & Logs", "q": "How do you watch a live web server access log as traffic comes in?", "a": "Use the command: <code>tail -f /var/log/nginx/access.log</code>. The '-f' flag follows the end of the file in real-time."},
        {"cat": "Troubleshooting & Logs", "q": "A user complains they cannot SSH into the server. What log file do you check?", "a": "Check the authentication logs: <code>/var/log/auth.log</code> (Ubuntu) or <code>/var/log/secure</code> (RHEL) to look for PAM rejections, failed passwords, or key mismatches."},
        {"cat": "Troubleshooting & Logs", "q": "You run a command and get 'Permission denied', but you are logged in as root. Why?", "a": "The file might have the immutable attribute set. Use <code>lsattr file.txt</code> to check. If it has an 'i', remove it with <code>chattr -i file.txt</code>. Alternatively, SELinux policies are blocking root access."},
        {"cat": "Troubleshooting & Logs", "q": "The server randomly rebooted overnight. Where do you look for the cause?", "a": "Check <code>/var/log/syslog</code> leading up to the reboot time. Check for kernel panics or hardware failures using <code>dmesg -T</code>. Check if a user issued a reboot command in <code>/var/log/wtmp</code> using the 'last' command."},
        {"cat": "Troubleshooting & Logs", "q": "How do you identify which files are currently eating up the most space in /var?", "a": "Run <code>du -ah /var | sort -rh | head -n 10</code>. This estimates the sizes of all files, sorts them in reverse human-readable format, and displays the top 10 largest files."},
        {"cat": "Troubleshooting & Logs", "q": "An application is running, but external connections fail. The port is listening. What next?", "a": "Check the local firewall (iptables/ufw). If the port is open locally, coordinate with the network team to check external hardware firewalls or cloud security groups (like AWS Security Groups)."},
        {"cat": "Troubleshooting & Logs", "q": "What does a 'kernel panic' signify?", "a": "It is a fatal error from which the Linux kernel cannot safely recover. It halts the system completely to prevent severe data corruption, usually caused by failing hardware (RAM/Disk) or a severely buggy driver."},
        
        {"cat": "Backups & Automation", "q": "Explain the 3-2-1 backup strategy.", "a": "Keep 3 total copies of your data. Store them on 2 different types of storage media. Keep at least 1 copy offsite (or in a geographically separate cloud region) for disaster recovery."},
        {"cat": "Backups & Automation", "q": "Why is 'rsync' heavily preferred over 'cp' for remote backups?", "a": "Rsync performs differential transfers. Instead of recopying a 10GB file every night, rsync calculates the checksums and transfers *only* the specific blocks of data that changed, saving massive network bandwidth."},
        {"cat": "Backups & Automation", "q": "Write a cron expression to run a script at 3:30 AM every Monday.", "a": "<code>30 3 * * 1 /path/to/script.sh</code> (Minute=30, Hour=3, DayOfMonth=*, Month=*, DayOfWeek=1)."},
        {"cat": "Backups & Automation", "q": "What is the difference between cron and anacron?", "a": "Cron assumes a server is running 24/7. If a server is powered off during a scheduled cron job, it is skipped. Anacron is designed for systems that might sleep; it will execute missed jobs automatically upon the next boot."},
        {"cat": "Backups & Automation", "q": "In a bash script, what does the variable '$?' do?", "a": "It holds the exit status of the very last command executed. 0 means absolute success. Any number from 1-255 means an error occurred. Vital for if/else error handling in automation."},
        {"cat": "Backups & Automation", "q": "What is the difference between '>' and '>>' in bash logging?", "a": "The '>' operator redirects output and completely overwrites the target file. The '>>' operator safely appends the output to the bottom of the target file, preserving historical data."},
        {"cat": "Backups & Automation", "q": "How do you redirect both standard output (normal text) and standard error (error text) to a single log file?", "a": "Append <code>> script.log 2>&1</code> to the end of your command. This redirects file descriptor 2 (stderr) into file descriptor 1 (stdout), sending everything to the file."},
        {"cat": "Backups & Automation", "q": "Why use Ansible for server configuration instead of massive Bash scripts?", "a": "Ansible is agentless (uses standard SSH) and is Idempotent. Instead of writing bash logic to check if a file exists before creating it, Ansible simply declares 'make sure this file exists', and handles the background logic safely across hundreds of servers simultaneously."},
        {"cat": "Backups & Automation", "q": "How do you take a MySQL database backup from the command line?", "a": "Use <code>mysqldump -u root -p database_name > backup.sql</code>. This generates a raw text file filled with the SQL queries required to perfectly rebuild the database."},
        {"cat": "Backups & Automation", "q": "Why is disaster recovery (DR) testing mandatory?", "a": "A backup is completely useless if it is corrupted or cannot be restored under pressure. Routine DR testing validates data integrity, updates recovery documentation, and ensures the Recovery Time Objective (RTO) is met."}
